name: Build Calendars

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name for the uploaded artifact"
        required: false
        default: "github-pages"
        type: string
    outputs:
      error-count:
        description: "Number of errors during calendar generation"
        value: ${{ jobs.build.outputs.error-count }}
      zero-event-calendars:
        description: "Newline-separated list of calendars with 0 events"
        value: ${{ jobs.build.outputs.zero-event-calendars }}
      new-zero-event-sources:
        description: "Newline-separated list of new sources with 0 events that have never appeared in production"
        value: ${{ jobs.build.outputs.new-zero-event-sources }}
      new-source-summary:
        description: "JSON summary of new sources not in production (event counts + sample events)"
        value: ${{ jobs.build.outputs.new-source-summary }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      error-count: ${{ steps.generate-calendars.outputs.ERROR_COUNT }}
      zero-event-calendars: ${{ steps.generate-calendars.outputs.ZERO_EVENT_CALENDARS }}
      new-zero-event-sources: ${{ steps.generate-calendars.outputs.NEW_ZERO_EVENT_SOURCES }}
      new-source-summary: ${{ steps.generate-calendars.outputs.NEW_SOURCE_SUMMARY }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fetch base ref for new source detection
      if: github.base_ref != ''
      run: |
        git fetch origin ${{ github.base_ref }}
        echo "GITHUB_BASE_REF=${{ github.base_ref }}" >> $GITHUB_ENV

    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Check no null returns in rippers
      run: bash scripts/check_no_null_returns.sh

    - name: Run unit tests
      run: npm run test:all

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-west-2
      # Do NOT use continue-on-error here. If AWS credentials fail,
      # the geo-cache cannot be downloaded from S3 and the build will
      # take 20+ minutes re-geocoding every location. Fail fast instead.

    - name: Download geo-cache from S3
      env:
        OUTOFBAND_BUCKET: ${{ vars.OUTOFBAND_BUCKET }}
      run: |
        aws s3 cp "s3://${OUTOFBAND_BUCKET:-calendar-ripper-outofband-220483515252}/latest/geo-cache.json" geo-cache.json \
          && echo "geo-cache restored from S3 ($(jq '.entries | length' geo-cache.json) entries)" \
          || echo "S3 geo-cache not available, using committed baseline"

    - name: Download event-uncertainty-cache from S3
      env:
        OUTOFBAND_BUCKET: ${{ vars.OUTOFBAND_BUCKET }}
      run: |
        # Save the committed baseline. When a web session can't reach S3 it
        # commits resolved entries to the repo; those would be silently dropped
        # if S3 (possibly older/empty) won outright. Merge instead: S3 takes
        # precedence on key conflicts, committed entries fill any gaps.
        cp event-uncertainty-cache.json /tmp/committed-uncertainty-cache.json
        if aws s3 cp "s3://${OUTOFBAND_BUCKET:-calendar-ripper-outofband-220483515252}/latest/event-uncertainty-cache.json" /tmp/s3-uncertainty-cache.json; then
          COMMITTED=$(jq '.entries | length' /tmp/committed-uncertainty-cache.json)
          S3=$(jq '.entries | length' /tmp/s3-uncertainty-cache.json)
          jq -s '{version: 1, entries: (.[0].entries + .[1].entries)}' \
            /tmp/committed-uncertainty-cache.json /tmp/s3-uncertainty-cache.json \
            > event-uncertainty-cache.json
          MERGED=$(jq '.entries | length' event-uncertainty-cache.json)
          echo "event-uncertainty-cache: merged ${COMMITTED} committed + ${S3} S3 = ${MERGED} total entries"
        else
          echo "S3 event-uncertainty-cache not available, using committed baseline"
        fi

    - name: Download out-of-band calendars
      env:
        OUTOFBAND_BUCKET: ${{ vars.OUTOFBAND_BUCKET }}
      run: npm run download-outofband

    - name: Generate calendars
      id: generate-calendars
      env:
        TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        DICE_API_KEY: ${{ secrets.DICE_API_KEY }}
      run: |
        npm run generate-calendars
        cat errorCount.txt
        echo "ERROR_COUNT=$(cat errorCount.txt)" >> "$GITHUB_OUTPUT"
        cat zeroEventCalendars.txt
        delimiter="ghadelim_$(openssl rand -hex 8)"
        {
          echo "ZERO_EVENT_CALENDARS<<${delimiter}"
          cat zeroEventCalendars.txt
          echo ""
          echo "${delimiter}"
        } >> "$GITHUB_OUTPUT"
        cat newZeroEventSources.txt
        delimiter2="ghadelim_$(openssl rand -hex 8)"
        {
          echo "NEW_ZERO_EVENT_SOURCES<<${delimiter2}"
          cat newZeroEventSources.txt
          echo ""
          echo "${delimiter2}"
        } >> "$GITHUB_OUTPUT"
        cat newSourceParseErrors.txt
        delimiter3="ghadelim_$(openssl rand -hex 8)"
        {
          echo "NEW_SOURCE_PARSE_ERRORS<<${delimiter3}"
          cat newSourceParseErrors.txt
          echo ""
          echo "${delimiter3}"
        } >> "$GITHUB_OUTPUT"
        delimiter4="ghadelim_$(openssl rand -hex 8)"
        {
          echo "NEW_SOURCE_SUMMARY<<${delimiter4}"
          cat output/new-source-summary.json
          echo ""
          echo "${delimiter4}"
        } >> "$GITHUB_OUTPUT"

    - name: Check for build errors
      run: |
        FATAL_ERROR_COUNT=$(cat fatalErrorCount.txt)
        if [ "$FATAL_ERROR_COUNT" -gt 0 ]; then
          echo "::error::Build failed with $FATAL_ERROR_COUNT fatal error(s) (new source parse errors or zero-event sources)"
          exit 1
        fi

    - name: Upload geo-cache to S3
      if: always()
      env:
        OUTOFBAND_BUCKET: ${{ vars.OUTOFBAND_BUCKET }}
      run: |
        aws s3 cp geo-cache.json "s3://${OUTOFBAND_BUCKET:-calendar-ripper-outofband-220483515252}/latest/geo-cache.json" \
          && echo "geo-cache uploaded to S3 ($(jq '.entries | length' geo-cache.json) entries)" \
          || echo "S3 upload failed (credentials not configured?)"

    - name: Upload event-uncertainty-cache to S3
      if: always()
      env:
        OUTOFBAND_BUCKET: ${{ vars.OUTOFBAND_BUCKET }}
      run: |
        aws s3 cp event-uncertainty-cache.json "s3://${OUTOFBAND_BUCKET:-calendar-ripper-outofband-220483515252}/latest/event-uncertainty-cache.json" \
          && echo "event-uncertainty-cache uploaded to S3 ($(jq '.entries | length' event-uncertainty-cache.json) entries)" \
          || echo "S3 upload failed (credentials not configured?)"

    - name: Validate discovery API
      run: npm run check-discovery-api

    - name: Build web interface
      run: npm run web:build
      env:
        VITE_FAVORITES_API_URL: ${{ vars.FAVORITES_API_URL }}

    - name: Get GitHub Pages URL
      id: get-pages-url
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Try to get the GitHub Pages URL, fail gracefully if not configured
        PAGES_URL=$(gh api repos/${{ github.repository }}/pages --jq '.html_url' 2>/dev/null || echo "")
        echo "PAGES_URL=${PAGES_URL}" >> "$GITHUB_OUTPUT"
        if [ -n "$PAGES_URL" ]; then
          echo "GitHub Pages URL: $PAGES_URL"
        else
          echo "GitHub Pages not configured or not accessible, skipping URL check"
        fi

    - name: Upload geo-cache artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: geo-cache
        path: geo-cache.json
        retention-days: 90

    - name: Upload event-uncertainty-cache artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: event-uncertainty-cache
        path: event-uncertainty-cache.json
        retention-days: 90

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        path: 'output/'
        name: ${{ inputs.artifact-name }}

    - name: Check for missing calendar URLs
      if: steps.get-pages-url.outputs.PAGES_URL != ''
      run: npm run check-missing-urls -- "${{ steps.get-pages-url.outputs.PAGES_URL }}"
