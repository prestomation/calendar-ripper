name: Discord Notifications

on:
  workflow_run:
    workflows:
      - "Generate Calendars and Publish to GitHub Pages"
      - "PR Preview"
      - "Deploy Favorites Worker"
      - "Cleanup Preview"
    types:
      - completed
  pull_request_review:
    types:
      - submitted

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact for new source summary
        if: github.event_name == 'workflow_run' && github.event.workflow_run.name == 'PR Preview' && github.event.workflow_run.conclusion == 'success'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          path: artifact-download

      - name: Extract PR link for workflow_run
        if: github.event_name == 'workflow_run'
        id: pr-link
        run: |
          # Extract PR number and URL from the workflow_run event's associated pull_requests
          PR_NUMBER=""
          PR_URL=""
          if [ "${{ github.event.workflow_run.pull_requests[0].number }}" != "" ]; then
            PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
            PR_URL="${{ github.event.workflow_run.pull_requests[0].html_url }}"
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Notify workflow run
        if: github.event_name == 'workflow_run' && (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.name == 'PR Preview' || github.event.workflow_run.name == 'Generate Calendars and Publish to GitHub Pages' || contains(github.event.workflow_run.name, 'cron') || contains(github.event.workflow_run.name, 'schedule'))
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CALENDAR }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr-link.outputs.pr_number }}
          PR_URL: ${{ steps.pr-link.outputs.pr_url }}
        run: |
          case "$WORKFLOW_CONCLUSION" in
            success)   EMOJI="✅" ;;
            failure)   EMOJI="❌" ;;
            cancelled) EMOJI="🚫" ;;
            skipped)   EMOJI="⏭️" ;;
            *)         EMOJI="⚠️" ;;
          esac

          # Build embed fields for Discord (no markdown [text](url) — Discord doesn't render it)
          EMBED_TITLE=""
          EMBED_URL=""
          EMBED_DESC=""
          EMBED_COLOR=""

          # Color based on conclusion
          case "$WORKFLOW_CONCLUSION" in
            success)   EMBED_COLOR="3066993" ;;   # green
            failure)   EMBED_COLOR="15158332" ;;   # red
            cancelled) EMBED_COLOR="9807270" ;;    # grey
            skipped)   EMBED_COLOR="9807270" ;;    # grey
            *)         EMBED_COLOR="15844367" ;;   # yellow
          esac

          # Build embed title and URL
          if [ -n "$PR_URL" ]; then
            EMBED_TITLE="View PR #${PR_NUMBER}"
            EMBED_URL="${PR_URL}"
          else
            EMBED_TITLE="View repo"
            EMBED_URL="https://github.com/${REPO}"
          fi

          # Build the content text (mentions + summary)
          if [ "$WORKFLOW_NAME" = "Generate Calendars and Publish to GitHub Pages" ] && [ "$WORKFLOW_CONCLUSION" = "success" ]; then
            CONTENT="<@&1482439580006354987> ${EMOJI} **${WORKFLOW_NAME}** on \`${REPO}\` / \`${BRANCH}\` — **${WORKFLOW_CONCLUSION}**"
            EMBED_DESC="📊 Build complete. Please run the build-report skill to check for errors, then run source-discovery if the build is healthy."
          else
            # For PR Preview success, include preview link and new source summary
            PREVIEW_LINE=""
            NEW_SOURCE_LINE=""
            if [ "$WORKFLOW_NAME" = "PR Preview" ] && [ "$WORKFLOW_CONCLUSION" = "success" ]; then
              # Try to extract the preview deployment URL from the artifact
              DEPLOY_URL_FILE=$(find artifact-download -name deployment-url.txt -type f 2>/dev/null | head -1)
              DEPLOY_URL=""
              if [ -n "$DEPLOY_URL_FILE" ]; then
                DEPLOY_URL=$(cat "$DEPLOY_URL_FILE" 2>/dev/null | tr -d '[:space:]')
              elif [ -n "$PR_NUMBER" ]; then
                # Fallback: construct the expected preview URL
                DEPLOY_URL="https://pr-${PR_NUMBER}.206events.pages.dev"
              fi
              if [ -n "$DEPLOY_URL" ]; then
                PREVIEW_LINE=$'\n'"🔗 **Preview:** ${DEPLOY_URL}"
              fi
              SUMMARY_FILE=$(find artifact-download -name new-source-summary.json -type f 2>/dev/null | head -1)
              if [ -n "$SUMMARY_FILE" ]; then
                SOURCE_COUNT=$(jq 'length' "$SUMMARY_FILE" 2>/dev/null || echo "0")
                if [ "$SOURCE_COUNT" -gt 0 ] 2>/dev/null; then
                  NEW_SOURCE_LINE=$'\n'"🆕 ${SOURCE_COUNT} new source(s)"
                  for i in $(seq 0 $((SOURCE_COUNT - 1))); do
                    SRC_NAME=$(jq -r ".[$i].source" "$SUMMARY_FILE" 2>/dev/null)
                    SRC_EVENTS=$(jq -r ".[$i].eventCount" "$SUMMARY_FILE" 2>/dev/null)
                    EVT_SUMMARY=$(jq -r ".[$i].sampleEvents[0].summary // empty" "$SUMMARY_FILE" 2>/dev/null)
                    EVT_DATE=$(jq -r ".[$i].sampleEvents[0].date // empty" "$SUMMARY_FILE" 2>/dev/null)
                    EVT_LOCATION=$(jq -r ".[$i].sampleEvents[0].location // empty" "$SUMMARY_FILE" 2>/dev/null)
                    if [ -n "$EVT_SUMMARY" ]; then
                      FORMATTED_DATE=$(date -d "$EVT_DATE" "+%a %b %d, %I:%M %p" 2>/dev/null || echo "$EVT_DATE")
                      LOCATION_PART=""
                      if [ -n "$EVT_LOCATION" ]; then
                        LOCATION_PART=" at ${EVT_LOCATION}"
                      fi
                      NEW_SOURCE_LINE="${NEW_SOURCE_LINE}"$'\n'"   📌 ${EVT_SUMMARY} — ${FORMATTED_DATE}${LOCATION_PART}"
                    fi
                  done
                fi
              fi
            fi
            CONTENT="<@&1482439580006354987> ${EMOJI} **${WORKFLOW_NAME}** on \`${REPO}\` / \`${BRANCH}\` — **${WORKFLOW_CONCLUSION}**${PREVIEW_LINE}${NEW_SOURCE_LINE}"
            EMBED_DESC="${BRANCH}"
          fi
          PAYLOAD=$(jq -n \
            --arg content "$CONTENT" \
            --arg embed_title "$EMBED_TITLE" \
            --arg embed_url "$EMBED_URL" \
            --arg embed_desc "$EMBED_DESC" \
            --argjson embed_color "$EMBED_COLOR" \
            '{content:$content,embeds:[{title:$embed_title,url:$embed_url,description:$embed_desc,color:$embed_color}]}')
          curl -s --fail -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"

      - name: Notify review
        if: github.event_name == 'pull_request_review'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CALENDAR }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEWER: ${{ github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_URL: ${{ github.event.review.html_url }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          case "$REVIEW_STATE" in
            approved)          EMOJI="✅" LABEL="approved" ;;
            changes_requested) EMOJI="🔁" LABEL="requested changes on" ;;
            commented)         EMOJI="💬" LABEL="commented on" ;;
            dismissed)         EMOJI="🚫" LABEL="dismissed review on" ;;
            *)                 EMOJI="ℹ️" LABEL="reviewed" ;;
          esac

          PREVIEW=$(echo "$REVIEW_BODY" | head -c 600 | iconv -c -t UTF-8 | head -c 200 | tr '\n' ' ')

          # Review embed color
          case "$REVIEW_STATE" in
            approved)          EMBED_COLOR="3066993" ;;  # green
            changes_requested) EMBED_COLOR="15158332" ;;  # red
            commented)         EMBED_COLOR="15844367" ;;  # yellow
            dismissed)         EMBED_COLOR="9807270" ;;   # grey
            *)                 EMBED_COLOR="9807270" ;;   # grey
          esac

          EMBED_DESC=""
          if [ -n "$PREVIEW" ]; then
            CONTENT="<@&1482439580006354987> ${EMOJI} \`${REVIEWER}\` ${LABEL} PR #${PR_NUMBER}"
            EMBED_DESC="> ${PREVIEW}"
          else
            CONTENT="<@&1482439580006354987> ${EMOJI} \`${REVIEWER}\` ${LABEL} PR #${PR_NUMBER}"
          fi
          PAYLOAD=$(jq -n \
            --arg content "$CONTENT" \
            --arg embed_title "View PR #${PR_NUMBER}" \
            --arg embed_url "$PR_URL" \
            --arg embed_desc "$EMBED_DESC" \
            --argjson embed_color "$EMBED_COLOR" \
            '{content:$content,embeds:[{title:$embed_title,url:$embed_url,description:$embed_desc,color:$embed_color}]}')
          curl -s --fail -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"