name: Discord Notifications

on:
  workflow_run:
    workflows:
      - "Generate Calendars and Publish to GitHub Pages"
      - "PR Preview"
      - "Deploy Favorites Worker"
      - "Cleanup Preview"
    types:
      - completed
  pull_request_review:
    types:
      - submitted

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify workflow run
        if: github.event_name == 'workflow_run' && (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.name == 'PR Preview' || contains(github.event.workflow_run.name, 'cron') || contains(github.event.workflow_run.name, 'schedule'))
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CALENDAR }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          case "$WORKFLOW_CONCLUSION" in
            success)   EMOJI="✅" ;;
            failure)   EMOJI="❌" ;;
            cancelled) EMOJI="🚫" ;;
            skipped)   EMOJI="⏭️" ;;
            *)         EMOJI="⚠️" ;;
          esac

          # For the main build workflow, include skill run instructions
          if [ "$WORKFLOW_NAME" = "Generate Calendars and Publish to GitHub Pages" ] && [ "$WORKFLOW_CONCLUSION" = "success" ]; then
            CONTENT="<@\&1482439580006354987> ${EMOJI} **${WORKFLOW_NAME}** on \`${REPO}\` / \`${BRANCH}\` — **${WORKFLOW_CONCLUSION}**"$'\n'"[View run](${WORKFLOW_URL})"$'\n\n'"📊 Build complete. Please run the build-report skill to check for errors, then run source-discovery if the build is healthy."
          else
            CONTENT="<@\&1482439580006354987> ${EMOJI} **${WORKFLOW_NAME}** on \`${REPO}\` / \`${BRANCH}\` — **${WORKFLOW_CONCLUSION}**"$'\n'"[View run](${WORKFLOW_URL})"
          fi
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content":$content}')
          curl -s --fail -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"

      - name: Notify review
        if: github.event_name == 'pull_request_review'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CALENDAR }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEWER: ${{ github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_URL: ${{ github.event.review.html_url }}
        run: |
          case "$REVIEW_STATE" in
            approved)          EMOJI="✅" LABEL="approved" ;;
            changes_requested) EMOJI="🔁" LABEL="requested changes on" ;;
            commented)         EMOJI="💬" LABEL="commented on" ;;
            dismissed)         EMOJI="🚫" LABEL="dismissed review on" ;;
            *)                 EMOJI="ℹ️" LABEL="reviewed" ;;
          esac

          PREVIEW=$(echo "$REVIEW_BODY" | head -c 600 | iconv -c -t UTF-8 | head -c 200 | tr '\n' ' ')
          if [ -n "$PREVIEW" ]; then
            CONTENT="<@\&1482439580006354987> ${EMOJI} \`${REVIEWER}\` ${LABEL} PR #${PR_NUMBER}"$'\n'"> ${PREVIEW}"$'\n'"[View review](${REVIEW_URL})"
          else
            CONTENT="<@\&1482439580006354987> ${EMOJI} \`${REVIEWER}\` ${LABEL} PR #${PR_NUMBER}"$'\n'"[View review](${REVIEW_URL})"
          fi
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content":$content}')
          curl -s --fail -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"


