name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    uses: ./.github/workflows/build-calendars.yml
    permissions:
      id-token: write    # OIDC token for AWS proxy authentication
      contents: read
    secrets: inherit
    with:
      artifact-name: pr-preview-${{ github.event.number }}

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: /tmp/preview-content

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Deploy preview to gh-pages
        run: |
          cd gh-pages
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          # Remove old preview for this PR if it exists
          rm -rf preview/${{ github.event.number }}
          mkdir -p preview/${{ github.event.number }}

          # Copy new preview content
          cp -r /tmp/preview-content/* preview/${{ github.event.number }}/

          git add -A
          git commit -m "Update PR #${{ github.event.number }} preview" || exit 0
          git pull --rebase origin gh-pages
          git push

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('📅 Calendar Preview')
            );

            const errorCount = '${{ needs.build.outputs.error-count }}';
            const errorBadge = errorCount === '0' ? '✅ No errors' : `❌ ${errorCount} errors`;
            const previewUrl = `https://prestomation.github.io/calendar-ripper/preview/${{ github.event.number }}/`;

            const zeroEventCalendarsRaw = `${{ needs.build.outputs.zero-event-calendars }}`;
            const zeroEventCalendars = zeroEventCalendarsRaw.trim().split('\n').filter(Boolean);
            const zeroEventSection = zeroEventCalendars.length > 0
              ? `\n\n<details>\n<summary>⚠️ ${zeroEventCalendars.length} calendar(s) with 0 events</summary>\n\n${zeroEventCalendars.map(c => `- \`${c}\``).join('\n')}\n\n</details>`
              : '\n\n✅ All calendars have events';

            // Read build-errors.json for detailed error breakdown
            let buildErrors = { configErrors: [], sources: [], externalCalendarFailures: [] };
            try {
              buildErrors = JSON.parse(fs.readFileSync('/tmp/preview-content/build-errors.json', 'utf8'));
            } catch (e) {
              // File unavailable or parse failed — skip detailed breakdown
            }

            const unexpectedNonEmpty = buildErrors.unexpectedNonEmptyCalendars || [];
            const unexpectedNonEmptySection = unexpectedNonEmpty.length > 0
              ? `\n\n<details>\n<summary>ℹ️ ${unexpectedNonEmpty.length} calendar(s) marked expectEmpty but have events</summary>\n\n${unexpectedNonEmpty.map(c => `- \`${c.name}\`: ${c.events} events — consider removing expectEmpty`).join('\n')}\n\n</details>`
              : '';

            let errorSection = '';
            if (parseInt(errorCount) > 0) {
              const lines = [];
              const configErrors = buildErrors.configErrors || [];
              const sourceErrors = buildErrors.sources || [];
              const externalFailures = buildErrors.externalCalendarFailures || [];

              if (configErrors.length > 0) {
                lines.push(`**Config errors (${configErrors.length}):**`);
                configErrors.forEach(e => {
                  lines.push(`- \`${e.path || e.type || 'unknown'}\`: ${e.reason || 'No reason provided'}`);
                });
                lines.push('');
              }

              if (sourceErrors.length > 0) {
                const totalSourceErrors = sourceErrors.reduce((a, s) => a + (s.errorCount || 0), 0);
                lines.push(`**Parse errors in ${sourceErrors.length} calendar(s) (${totalSourceErrors} total):**`);
                sourceErrors.forEach(s => {
                  lines.push(`- \`${s.source || 'unknown'}/${s.calendar || 'unknown'}\`: ${s.errorCount || 0} error(s)`);
                });
                lines.push('');
              }

              if (externalFailures.length > 0) {
                lines.push(`**External calendar failures (${externalFailures.length}):**`);
                externalFailures.forEach(f => {
                  lines.push(`- \`${f.name || 'unknown'}\`: ${f.error || 'Unknown error'}`);
                });
                lines.push('');
              }

              if (lines.length > 0) {
                errorSection = `\n\n<details>\n<summary>🔍 ${errorCount} error(s) — click to expand</summary>\n\n${lines.join('\n')}\n</details>`;
              }
            }

            const body = [
              '## 📅 Calendar Preview',
              '',
              `**Status:** ${errorBadge}`,
              `**Preview:** [View Calendar Index](${previewUrl})`,
              `**Commit:** ${{ github.event.pull_request.head.sha }}`,
              errorSection,
              zeroEventSection,
              unexpectedNonEmptySection,
              '',
              '> 🔗 Preview deployed to GitHub Pages — sign-in works in previews'
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
