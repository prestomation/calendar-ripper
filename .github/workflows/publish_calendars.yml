name: Generate Calendars and Publish to GitHub Pages

on:
  schedule:
    - cron: "0 0 * * *" # Daily
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering  

jobs:
  jitter:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Random jitter (up to 3 hours)
        run: sleep $((RANDOM % 10800))

  build:
    needs: [jitter]
    if: always() && (needs.jitter.result == 'success' || needs.jitter.result == 'skipped')
    uses: ./.github/workflows/build-calendars.yml
    permissions:
      id-token: write    # OIDC token for AWS proxy authentication
      contents: read
    secrets: inherit

  check-errors:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Check Error Count
      env:
        ERROR_COUNT: ${{ needs.build.outputs.error-count }}
      # Fail this if we have a positive error count.
      # This way we keep publishing our calendars even if there are errors, but we get a notification from this failed step
      run: (( $ERROR_COUNT == 0 ))

  deploy:
    # Always run this deploy, even if the build failed. This is so we get newest results even if a calendar had errors
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    concurrency:
      group: cf-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: output

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy output/ --project-name=calendar-ripper
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
