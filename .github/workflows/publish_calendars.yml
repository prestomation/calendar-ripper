name: Generate Calendars and Publish to GitHub Pages

on:
  schedule:
    - cron: "0 0 * * *" # Daily
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering  

jobs:
  jitter:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Random jitter (up to 3 hours)
        run: sleep $((RANDOM % 10800))

  build:
    needs: [jitter]
    if: always() && (needs.jitter.result == 'success' || needs.jitter.result == 'skipped')
    uses: ./.github/workflows/build-calendars.yml
    permissions:
      id-token: write    # OIDC token for AWS proxy authentication
      contents: read
    secrets: inherit

  check-errors:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Check Error Count
      env:
        ERROR_COUNT: ${{ needs.build.outputs.error-count }}
      # Fail this if we have a positive error count.
      # This way we keep publishing our calendars even if there are errors, but we get a notification from this failed step
      run: (( $ERROR_COUNT == 0 ))

  deploy:
    # Always run this deploy, even if the build failed. This is so we get newest results even if a calendar had errors
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    concurrency:
      group: cf-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: output

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy output/ --project-name=206events
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  trigger-error-routine:
    # Trigger a Claude Code routine to investigate and fix build errors.
    # Runs on any build with errors (push, schedule, or manual dispatch).
    # Does NOT run on PRs (this workflow doesn't trigger on PRs).
    # Skips if CLAUDE_ROUTINE_ID is not configured.
    if: always() && needs.build.outputs.error-count != '' && needs.build.outputs.error-count != '0'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check routine config
        id: check-config
        run: |
          if [ -z "$CLAUDE_ROUTINE_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: CLAUDE_ROUTINE_ID not configured"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLAUDE_ROUTINE_ID: ${{ vars.CLAUDE_ROUTINE_ID }}

      - name: Trigger Claude Code build-error routine
        if: steps.check-config.outputs.skip != 'true'
        env:
          CLAUDE_ROUTINE_TOKEN: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
          CLAUDE_ROUTINE_ID: ${{ vars.CLAUDE_ROUTINE_ID }}
          ERROR_COUNT: ${{ needs.build.outputs.error-count }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "Build errors detected on main branch. Error count: ${ERROR_COUNT}. Commit: ${COMMIT_SHA}. Run: ${RUN_URL}" \
            '{text: $text}')
          echo "Triggering Claude Code routine ${CLAUDE_ROUTINE_ID}..."
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/routine-response.json -w "%{http_code}" -X POST \
            "https://api.anthropic.com/v1/claude_code/routines/${CLAUDE_ROUTINE_ID}/fire" \
            -H "Authorization: Bearer $CLAUDE_ROUTINE_TOKEN" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || HTTP_CODE="000"
          echo "Response: HTTP $HTTP_CODE"
          if [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Routine triggered successfully"
            jq -r '.claude_code_session_url // "(no session URL)"' /tmp/routine-response.json
          else
            echo "::warning::Failed to trigger Claude Code routine (HTTP $HTTP_CODE)"
            jq . /tmp/routine-response.json 2>/dev/null || cat /tmp/routine-response.json
            # Don't fail the workflow — the routine trigger is best-effort
          fi
