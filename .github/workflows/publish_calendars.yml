name: Generate Calendars and Publish to GitHub Pages

on:
  schedule:
    - cron: "0 0 * * *" # Daily
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering  

jobs:
  build:
    uses: ./.github/workflows/build-calendars.yml
    permissions:
      id-token: write    # OIDC token for AWS proxy authentication
      contents: read
    secrets: inherit

  check-errors:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Check Error Count
      env:
        ERROR_COUNT: ${{ needs.build.outputs.error-count }}
      # Fail this if we have a positive error count.
      # This way we keep publishing our calendars even if there are errors, but we get a notification from this failed step
      run: (( $ERROR_COUNT == 0 ))

  deploy:
    # Always run this deploy, even if the build failed. This is so we get newest results even if a calendar had errors
    if: always()
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: /tmp/site-content

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
        continue-on-error: true
        id: checkout-ghpages

      - name: Create gh-pages branch if needed
        if: steps.checkout-ghpages.outcome == 'failure'
        run: |
          mkdir gh-pages && cd gh-pages
          git init
          git checkout --orphan gh-pages
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          touch .nojekyll
          git add .nojekyll
          git commit -m "Initialize gh-pages"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -u origin gh-pages

      - name: Deploy site content
        run: |
          cd gh-pages

          # Preserve PR preview directories
          if [ -d preview ]; then
            cp -r preview /tmp/preview-backup
          fi

          # Remove all tracked files
          git rm -rf . 2>/dev/null || true

          # Copy new site content
          cp -r /tmp/site-content/* .

          # Restore PR previews
          if [ -d /tmp/preview-backup ]; then
            cp -r /tmp/preview-backup preview
          fi

          # Ensure no Jekyll processing
          touch .nojekyll

          git add -A
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git commit -m "Deploy site from ${{ github.sha }}" || exit 0
          git push
