name = "calendar-ripper-favorites"
main = "src/index.ts"
compatibility_date = "2026-02-01"

[vars]
GITHUB_PAGES_BASE_URL = "https://prestomation.github.io/calendar-ripper"
SITE_URL = "https://prestomation.github.io/calendar-ripper"

[[kv_namespaces]]
binding = "USERS"
id = "d0c3c4e0a14c4a4284de09de18a1136f"

[[kv_namespaces]]
binding = "FAVORITES"
id = "d3d850c6081a4a0490e1e02c34e1c231"

[[kv_namespaces]]
binding = "FEED_TOKENS"
id = "d798d8ad13214ade84fd5692532a7993"

[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "PLACEHOLDER_PUSH_SUBSCRIPTIONS_KV_ID"

[[kv_namespaces]]
binding = "NOTIFICATION_LOG"
id = "PLACEHOLDER_NOTIFICATION_LOG_KV_ID"

[[queues.producers]]
queue = "calendar-notifications"
binding = "NOTIFICATION_QUEUE"

[[queues.consumers]]
queue = "calendar-notifications"
max_batch_size = 5
max_retries = 3
dead_letter_queue = "calendar-notifications-dlq"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "feed_requests"
