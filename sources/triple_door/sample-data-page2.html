    <div class="event-info-wrapper">
        <h2 class="event-info event-title heading-tertiary"><a href="https://thetripledoor.net/event/6456761/753084825/seattle-cabaret-festival-opening-night-arnaldo-the-love-markets-more">Seattle Cabaret Festival Opening Night: Arnaldo!, The Love Markets &amp; More!</a></h2>

        <p class="event-info event-datetime">
          <i class="icon-clock"></i>
          <span class="date-long"><span class="event-when with-time"><time class="from"><span class="date">Friday, May 8</span> @ <span class="time">7:30PM</span></time></span></span><span class="date-short"><span class="event-when with-time"><time class="from"><span class="date">Fri, May 8</span> @ <span class="time">7:30PM</span></time></span></span>
        </p>

        <p class="event-info event-location">
          <i class="icon-location"></i>
          <span>Mainstage Theatre, 216 Union Street, Seattle</span>
        </p>
    </div>

      <div class="event-info event-notes"><p>Seattle Cabaret Festival 2026 kicks off at The Triple Door with a phenomenal opening night showcase hosted by festival director Arnaldo! Drag Chanteuse (“Silky gowns and a silken voice” – City Arts) and featuring Weimar Berlin-inspired rock band The Love Markets (“Irresistible…A deliciously dark carnival” – Seattle Magazine). The night’s must-see lineup includes spotlight performances by nine of SCF 2026’s most uniquely captivating acts, including The Drunken Tenor, Seattle’s only standup-comedy opera singer; rowdy music-making and fiddle-playing from Black Bra Pirate Cabaret; the cheeky girl-group harmonies and ukelele rhythms of Blue Plate Special; the soul-stirring story songs of Claudine Mboligikpelani Nako; the expressive warmth of tenor Aaron Shanks; the song stylings of NYC Mac Award-winner Craig Pomranz and the rising stars of Rich Gray’s Cornish Cabaret; and offbeat hilarity and heart from Lopez Island singer-songwriter/guitarist/gay farmer Derek Eisel. ONE NIGHT ONLY!</p>

<p>Seattle Cabaret Festival 2026 is presented by Pacific Northwest Cabaret Association and powered by Shunpike.</p>
</div>

    <p class="event-info">
        <span class="event-info price">$30 General // $35 DOS // $40 Premium</span>
      
    </p>

        <h2 class="event-info event-title heading-tertiary"><a href="https://thetripledoor.net/event/6394313/748517007/for-the-love-of-tom-with-petty-thief">For the Love of Tom with Petty Thief</a></h2>

        <p class="event-info event-datetime">
          <i class="icon-clock"></i>
          <span class="date-long"><span class="event-when with-time"><time class="from"><span class="date">Saturday, May 9</span> @ <span class="time">7:30PM</span></time></span></span><span class="date-short"><span class="event-when with-time"><time class="from"><span class="date">Sat, May 9</span> @ <span class="time">7:30PM</span></time></span></span>
        </p>

        <p class="event-info event-location">
          <i class="icon-location"></i>
          <a target="_blank" rel="noopener" title="View on Google Maps" href="https://www.google.com/maps/search/?api=1&amp;query=216%20Union%20Street,%20Seattle">Mainstage Theatre, 216 Union Street, Seattle</a>
        </p>
    </div>

      <div class="event-info event-notes"><p>"Petty Thief" was formed the Fall of 2006 when Guitarist/Vocalist Andy Volmer gathered up some local musician friends to put together a band to play a set of Tom Petty and the Heartbreakers hits at a Halloween party at a venue in West Seattle. What started out as a one night stand has turned into a love affair that lasted for going on for over 15 years now and travels all over the great Pacific Northwest.</p>

<p>"Petty Thief" does a musically accurate 60-120 min set (depending on the venue and show) of Tom Petty's Greatest Hits. No silly wigs, no costumes, no funny beards, just the GREAT music of Tom Petty and the Heartbreakers! If you love the music of Tom Petty and the Heartbreakers, and let’s be honest, who doesn't. So, get out there and see Petty Thief live and in action. You’ll be glad you did!</p>
</div>

    <div class="event-info-wrapper">
        <h2 class="event-info event-title heading-tertiary"><a href="https://thetripledoor.net/event/6417077/750163340/willy-porter-and-mai-bloomfield-special-guest-jeremy-dion-at-the-rabbit-box">Willy Porter and Mai Bloomfield, Special Guest Jeremy Dion at The Rabbit Box</a></h2>

        <p class="event-info event-datetime">
          <i class="icon-clock"></i>
          <span class="date-long"><span class="event-when with-time"><time class="from"><span class="date">Saturday, May 9</span> @ <span class="time">7:30PM</span></time></span></span><span class="date-short"><span class="event-when with-time"><time class="from"><span class="date">Sat, May 9</span> @ <span class="time">7:30PM</span></time></span></span>
        </p>

        <p class="event-info event-location">
          <i class="icon-location"></i>
          <span>The Rabbit Box, 94 Pike St, Seattle, WA</span>
        </p>
    </div>

      <div class="event-info event-notes"><p>Some folks are lucky to find what they love to do at an early age and quietly settle in for the long haul expanding and developing their work over the arc of a lifetime. Willy Porter is one of those artists. He has followed his own path to explore the sacred language that music truly is. 30 years after his solo recording debut, he continues to reach further into his guitar &amp; pen while stretching the form of what his own music can be. He recently released his 13th full length album, The Ravine, in 2023.</p>

<p>Willy Porter continues on a musical and personal odyssey spanning over two decades, 11 albums, and multiple continents. His journey has been defined by an inquisitive love for humanity and the language that describes what we all hold to be true. Porter’s songs weave a universal perspective about the questions, struggles, and triumphs of human existence. His live shows are guitar-driven grit, soul, silence and muscle– at times electrifying, dynamic, and unique in the way that Porter’s voice blends and fuses with his fret work.</p>

<p>~~~~~~~~~~~~~~~~</p>

<p>Boulder-based songwriter Jeremy Dion is a licensed therapist by day who offers toe-tapping folktherapy by night. Drawing on influences from John Denver to John Mayer, Jeremy has brought his musical optimism to stages ranging from the Boulder Theater to the Edinburgh Fringe Festival. Weather audiences arrive feeling up, down, or just wanting a night on the town,
Jeremy’s heart-opening words will live you feeling connected, hopeful, and humming a tune - no couch required.</p>
</div>

        <span class="event-info price">$20 Advance // $25 Day of</span>
      
    </p>
